<!DOCTYPE html>
<html>
<head>
<style>
  /* Контейнер, где слои лежат друг на друге */
  .editor {
    position: relative;
    width: 500px;
    font-family: monospace; /* Важно: буквы одинаковой ширины */
    font-size: 18px;
  }

  textarea, .overlay {
    margin: 0;
    padding: 10px;
    width: 100%;
    height: 150px;
    line-height: 1.5;
    font-family: inherit;
    font-size: inherit;
    border: 2px solid #333;
    box-sizing: border-box;
    white-space: pre; /* Запрещаем перенос строк для точности */
    overflow: auto;
  }

  textarea {
    position: relative;
    z-index: 2;
    background: transparent; /* Видим сквозь него нижний слой */
    color: black;
    resize: none;
  }

  .overlay {
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    background: white;
    color: transparent; /* Прячем текст, оставляем только результат */
    pointer-events: none; /* Пропускаем клики к textarea */
    border-color: transparent;
  }

  /* Цвет для того самого "призрачного" результата */
  .res {
    color: #aaa; 
    font-style: italic;
  }
</style>
</head>
<body>

<h3>Текстовый калькулятор</h3>
<div class="editor">
  <div id="ghost" class="overlay"></div>
  <textarea id="input" placeholder="Напиши: x = 5 + 10"></textarea>
</div>

<script>
  const input = document.getElementById('input');
  const ghost = document.getElementById('ghost');

  input.addEventListener('input', () => {
    const lines = input.value.split('\n');
    let ghostContent = '';

    lines.forEach(line => {
      let resultText = '';

      // Простейшая логика: если есть "=", пробуем вычислить правую часть
      if (line.includes('=') && line.split('=')[1].trim() !== '') {
        try {
          const expression = line.split('=')[1];
          // В твоем проекте используй math.evaluate(expression, scope)
          const val = eval(expression); 
          if (val !== undefined && !isNaN(val)) {
            resultText = ` // = ${val}`;
          }
        } catch (e) {
          resultText = ''; // Если ошибка (например, буквы), ничего не пишем
        }
      }

      // Формируем слой: текст строки (невидим) + результат (серый)
      ghostContent += `<span>${line}</span><span class="res">${resultText}</span>\n`;
    });

    ghost.innerHTML = ghostContent;
  });

  // Синхронизируем прокрутку, если текста много
  input.addEventListener('scroll', () => {
    ghost.scrollTop = input.scrollTop;
    console.log('scroll' + ghost.scrollTop)
  });
</script>

</body>
</html>
